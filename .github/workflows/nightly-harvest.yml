name: Nightly harvest

# Runs at 18:00 UTC daily — early-morning Sydney, after the previous
# day's Hansard has typically been published (~24h after sitting).
# Also dispatch-able manually for backfills or re-bootstraps.
#
# BOOTSTRAP: the first run, or any run after the GHA cache evicts
# (default 7 days), starts with an empty raw-fragments cache. The
# nightly cron passes --since=14d so cache misses don't snowball into
# 4-hour fetches — but that means partial parsed data, which
# build_index correctly refuses to rebuild from. To bootstrap fresh:
# dispatch this workflow manually with the `since` input set to
# `2020-01-01`. Plan for ~3 hours of polite fetching. After the first
# successful run, cache stays warm as long as a nightly hits within
# the 7-day eviction window.

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      since:
        description: "Earliest sitting date to fetch (YYYY-MM-DD). Default: 14 days ago."
        required: false
        default: ''
      refresh_members:
        description: "Refresh members.json (party/chamber lookups). Default: yes."
        required: false
        default: 'yes'

permissions:
  contents: write

concurrency:
  group: harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    # 350 min so a manual --since=2020-01-01 bootstrap fits inside
    # GitHub's 6-hour hosted-runner ceiling. Daily incremental runs
    # complete in a few minutes.
    timeout-minutes: 350
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cache restore is a separate step from save so we can save
      # unconditionally on job end (`if: always()`). Default actions/cache
      # only saves on a successful job — when the bootstrap's push step
      # raced and failed, the entire 4-hour harvest's data went with it.
      - name: Restore harvest cache
        id: cache_restore
        uses: actions/cache/restore@v4
        with:
          path: |
            tools/raw-fragments
            tools/parsed-fragments
            tools/raw-estimates
            tools/parsed-estimates
            tools/hansard-ids.json
            tools/estimates-ids.json
          key: house-au-harvest-v1-${{ github.run_id }}
          restore-keys: |
            house-au-harvest-v1-

      - name: Compute --since cutoff
        id: since
        run: |
          if [ -n "${{ github.event.inputs.since }}" ]; then
            echo "value=${{ github.event.inputs.since }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      # ----- Chamber Hansard -----
      - name: Discover chamber sitting days
        run: python3 tools/discover_hansards.py --since 2020-01-01

      - name: Fetch chamber fragments (resumable)
        run: |
          python3 tools/fetch_fragments.py \
            --since "${{ steps.since.outputs.value }}" \
            --workers 8

      - name: Parse chamber fragments
        run: python3 tools/parse_fragments.py

      - name: Refresh members.json
        if: ${{ github.event.inputs.refresh_members != 'no' }}
        run: python3 tools/build_members.py

      - name: Build chamber shards
        run: python3 tools/build_index.py

      # ----- Senate Estimates -----
      - name: Discover Estimates sessions
        run: python3 tools/discover_estimates.py

      - name: Fetch Estimates fragments (resumable)
        run: python3 tools/fetch_estimates.py --workers 4

      - name: Parse Estimates
        run: python3 tools/parse_estimates.py

      - name: Build Estimates shards
        run: python3 tools/build_estimates_index.py

      # ----- Always save cache, even on later failures -----
      - name: Save harvest cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            tools/raw-fragments
            tools/parsed-fragments
            tools/raw-estimates
            tools/parsed-estimates
            tools/hansard-ids.json
            tools/estimates-ids.json
          key: house-au-harvest-v1-${{ github.run_id }}

      # ----- Commit + push, with rebase + retry on race -----
      - name: Commit + push if anything changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage published artefacts. tools/* stays gitignored.
          git add hansard-*.json hansard-*.json.gz members.json estimates-*.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new sitting days landed; nothing to commit."
            exit 0
          fi

          git commit -m "Nightly harvest: $(date -u +%Y-%m-%d)"

          # Push with retry: if main moved during our long-running
          # harvest (a manual push to fix something else, say), fetch +
          # rebase and try again. Bail after 3 attempts.
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed — fetching + rebasing onto remote main"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase produced conflicts — bailing"
              exit 1
            fi
            sleep $(( attempt * 5 ))
          done
          echo "Push still failing after 3 attempts — bailing"
          exit 1
