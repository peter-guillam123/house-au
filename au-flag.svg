<!--
  Simplified Australian flag for the wordmark.

  Renders cleanly down to ~10px tall. Real flag is 1:2; this SVG keeps
  that ratio. Union Jack canton is a stylised approximation rather than
  the full overlapping-cross construction — at this size, fidelity to
  the dominant red/white/blue is what reads.

  Federation Star in lower-left, Southern Cross dots on the right.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" role="img" aria-label="Australian flag">
  <!-- field -->
  <rect width="60" height="30" fill="#012169"/>

  <!-- Union Jack canton, upper-left 30x15 -->
  <g>
    <!-- white diagonals -->
    <path d="M0 0 L30 15 M30 0 L0 15" stroke="#fff" stroke-width="3"/>
    <!-- red diagonals (overlay, thinner) -->
    <path d="M0 0 L30 15 M30 0 L0 15" stroke="#c8102e" stroke-width="1.4"/>
    <!-- white cross -->
    <rect x="13"  y="0" width="4"  height="15" fill="#fff"/>
    <rect x="0" y="5.5" width="30" height="4"  fill="#fff"/>
    <!-- red cross (overlay) -->
    <rect x="13.5" y="0"   width="3"  height="15" fill="#c8102e"/>
    <rect x="0"    y="6"   width="30" height="3"  fill="#c8102e"/>
  </g>

  <!-- Federation Star, lower-left -->
  <polygon fill="#fff"
    points="15,18 16.1,21.6 19.9,21.6 16.9,23.9 18,27.4 15,25.2 12,27.4 13.1,23.9 10.1,21.6 13.9,21.6"/>

  <!-- Southern Cross, right half -->
  <circle cx="40" cy="6"  r="1.4" fill="#fff"/>
  <circle cx="49" cy="10" r="1.7" fill="#fff"/>
  <circle cx="46" cy="18" r="1.4" fill="#fff"/>
  <circle cx="52" cy="22" r="1.4" fill="#fff"/>
  <circle cx="44" cy="25" r="0.9" fill="#fff"/>
</svg>
